name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nixos-build:
    name: Build NixOS System
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            extra-substituters = https://cache.nixos.org/ https://noctalia.cachix.org
            extra-trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4=

      - name: Check flake
        run: nix flake check --all-systems

      - name: Show flake outputs
        run: nix flake show

      - name: Build Makima system
        run: nix build .#nixosConfigurations.Makima.config.system.build.toplevel --print-build-logs

  rust-ci:
    name: Rust Lint, Format & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            installer-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('installer-rs/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (lint)
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Verify Cargo.lock is up to date
        run: |
          cargo update --dry-run 2>&1
          echo "✅ Cargo.lock is up to date"
